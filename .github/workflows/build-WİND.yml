name: Sky-Core-OS Release
on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v3

      - name: Install Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y nasm  # İŞTE EKSİK OLAN KISIM BU

      - name: Build System
        run: |
          make clean
          make all

      - name: Create Release
        uses: softprops/action-gh-release@v1
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: |
            kernel.bin
            windos.iso
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
