name: Wind OS ISO Build Engine

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  compile-kernel-iso:
    name: "x86 Kernel & ISO Compilation"
    runs-on: ubuntu-latest

    steps:
    - name: "1. Kaynak Kodları ve Assetleri Çek (Checkout)"
      uses: actions/checkout@v4
      with:
        fetch-depth: 0 # Tüm commit geçmişini ve büyük verileri güvenle çekmek için

    - name: "2. Linux Çapraz Derleme Araçlarını Kur (Toolchain)"
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          nasm \
          gcc-multilib \
          build-essential \
          grub-pc-bin \
          grub-common \
          xorriso \
          mtools \
          libisoburn1 \
          mutilva

    - name: "3. Büyük Veri ve Paket Kapasite Sınırlarını Esnet (2 GB İzni)"
      run: |
        echo "[+] GitHub Runner disk ve bellek optimizasyonu yapılıyor..."
        df -h
        # Büyük paketlerin işlenmesi esnasında çıkabilecek IO tıkanıklıklarını önleme ayarı
        sudo sysctl -w vm.dirty_background_ratio=5
        sudo sysctl -w vm.dirty_ratio=10

    - name: "4. Mega Derleme Motorunu Çalıştır (build.sh)"
      run: |
        chmod +x build.sh
        ./build.sh

    - name: "5. Derleme Çıktılarını ve ISO Bütünlüğünü Doğrula"
      run: |
        if [ ! -f "windos.iso" ]; then
          echo "❌ HATA: Derleme motoru aşamaları tamamlayamadı, windos.iso kayıp!"
          exit 1
        fi
        echo "✅ BAŞARILI: ISO başarıyla doğrulandı."
        ls -lh windos.iso

    - name: "6. Üretilen ISO Dosyasını Dağıtıma Çıkar (Artifact Upload)"
      uses: actions/upload-artifact@v4
      with:
        name: WindOS-v1.5-Vortex-ISO
        path: windos.iso
        if-no-files-found: error
        retention-days: 7 # GitHub depolama kotasını şişirmemek için 7 gün saklanır
