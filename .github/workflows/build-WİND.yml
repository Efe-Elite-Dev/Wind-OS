name: Wind OS CI Build Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Depoyu Klonla (Checkout)
      uses: actions/checkout@v4

    - name: Sistem ve Derleme Araçlarını Kur (VGA & ISO Grubu)
      run: |
        sudo apt-get update
        sudo apt-get install -y nasm gcc-multilib build-essential grub-pc-bin xorriso mtools

    - name: Dosya Bütünlüğü ve Setup Modülü Kontrolü
      run: |
        if [ ! -f "setup.c" ] || [ ! -f "setup.h" ]; then
          echo "HATA: setup.c veya setup.h ana dizinde bulunamadı!"
          exit 1
        fi
        echo "Kurulum modülü dosyaları doğrulandı."

    - name: Wind OS Derleme Motorunu Ateşle (build.sh)
      run: |
        chmod +x build.sh
        ./build.sh

    - name: Nihai ISO Bütünlük Kontrolü
      run: |
        if [ ! -f "windos.iso" ]; then
          echo "HATA: Kritik sistem hatası, windos.iso üretilemedi!"
          exit 1
        fi
        echo "Doğrulama Başarılı: windos.iso başarıyla mühürlendi."

    - name: ISO Çıktısını Artifact Olarak Kaydet
      uses: actions/upload-artifact@v4
      with:
        name: windos-iso-build
        path: windos.iso
