name: 🚀 WIND OS MEGA BUILD & BOOT TEST ENGINE

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build_and_test:
    runs-on: ubuntu-latest

    steps:
    - name: 📥 Depoyu Klonla
      uses: actions/checkout@v4

    - name: 🛠️ Gerekli Derleme ve Test Bağımlılıklarını Kur
      run: |
        sudo apt-get update
        # Derleme araçları, x86_64 üzerinde 32-bit derleme kütüphaneleri ve xorriso
        sudo apt-get install -y nasm xorriso grub-pc-bin gcc-multilib build-essential
        # mformat hatasını çözen mtools ve matematiksel kontrol için bc paketi
        sudo apt-get install -y mtools bc
        # Arka planda görünmez ekran simülasyonu ve test için QEMU ile ImageMagick
        sudo apt-get install -y qemu-system-x86 xvfb imagemagick

    - name: 🔑 Çalıştırma İzinlerini Ayarla
      run: chmod +x build.sh

    - name: 🏗️ Sistemi Sıfırdan Derle (ISO Üret)
      run: ./build.sh

    - name: 🖥️ Canlı Boot Testi ve Siyah Ekran Denetimi
      run: |
        echo "[+] Sanal ekran (Xvfb) arka planda başlatılıyor..."
        Xvfb :99 -screen 0 1024x768x24 &
        export DISPLAY=:99
        sleep 2

        echo "[+] Sky Core OS, QEMU üzerinde boot ediliyor (Süre: 5 saniye)..."
        # Sanal makineyi standart VGA emülasyonu ile arka planda ateşliyoruz
        qemu-system-x86_64 -cdrom os_image.iso -m 256M -vga std &
        QEMU_PID=$!
        
        # Çekirdeğin yüklenmesi ve grafik modunun oturması için bekleme süresi
        sleep 5

        echo "[+] Ekranın canlı görüntüsü yakalanıyor (Screenshot)..."
        import -window root screenshot.png
        
        echo "[+] QEMU güvenli şekilde kapatılıyor..."
        kill $QEMU_PID || true

        echo "[🔍] Siyah Ekran Analiz Motoru Çalışıyor..."
        # Resimdeki piksellerin ortalama parlaklık değerini alıyoruz (0 = Tam Siyah, 1 = Tam Beyaz)
        MEAN_COLOR=$(convert screenshot.png -colorspace Gray -format "%[fx:mean]" info:)
        echo "[+] Ekran Parlaklık Oranı: $MEAN_COLOR"

        # Eşik değeri kontrolü: Eğer ekran tamamen siyahsa (0.02'den küçükse) testi patlatıyoruz
        if (( $(echo "$MEAN_COLOR < 0.02" | bc -l) )); then
          echo "======================================================================"
          echo "❌ HATA: SİYAH EKRAN ALGILANDI! Sistem grafik moduna geçemedi veya çöktü."
          echo "======================================================================"
          exit 1
        else
          echo "======================================================================"
          echo "✅ BAŞARILI: Ekran simsiyah değil! Grafik motoru pikselleri bastı."
          echo "======================================================================"
        fi

    - name: 📦 Ekran Görüntüsünü ve ISO'yu Kaydet
      if: always()  # Test başarısız olsa bile neyin çöktüğünü görmen için her zaman çalışır
      uses: actions/upload-artifact@v4
      with:
        name: SkyCoreOS-Boot-Result
        path: |
          os_image.iso
          screenshot.png
