name: Sky-Core-OS-DIREKT-ISO

on: [push]

jobs:
  build_iso:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Install Compilers and ISO Tools
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-multilib grub-pc-bin xorriso mtools

      - name: Clean and Compile Kernel
        run: |
          # Eski kalıntıları temizle
          rm -f *.o kernel.bin
          
          # 1. boot.s dosyasını GCC Assembler ile derle
          gcc -m32 -c boot.s -o boot.o
          
          # 2. Sadece C kaynak dosyalarını derle
          gcc -m32 -ffreestanding -O2 -Wall -Wextra -fno-pie -fno-stack-protector -c *.c
          
          # 3. boot.o'yu başa koy, geri kalan nesne dosyalarından boot.o'yu ayıklayarak bağla (Çift tanımlamayı önler)
          ld -m elf_i386 -T linker.ld -z noexecstack -o kernel.bin boot.o $(ls *.o | grep -v boot.o)

      - name: Prepare GRUB Layout and Generate ISO
        run: |
          mkdir -p iso_root/boot/grub
          cp kernel.bin iso_root/boot/kernel.bin
          cat << 'EOF' > iso_root/boot/grub/grub.cfg
          insmod vbe
          insmod vga
          set timeout=3
          set default=0
          set gfxmode=800x600x32
          set gfxpayload=keep

          menuentry "Sky-Core OS v1.5" {
              multiboot /boot/kernel.bin
              boot
          }
          EOF
          grub-mkrescue -o skycore.iso iso_root

      - name: Upload Only ISO
        uses: actions/upload-artifact@v4
        with:
          name: TIKLA-VE-DIREKT-ISO-INDIR
          path: skycore.iso
