name: Build Wind OS (Sky OS Engine)

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-22.04
    permissions:
      contents: write

    steps:
    - name: Depoyu Klonla (Checkout)
      uses: actions/checkout@v4

    - name: Evrensel Derleme ve Yapay Zeka Bağımlılıklarını Kur
      run: |
        sudo apt-get update
        sudo DEBIAN_FRONTEND=noninteractive apt-get install -yq \
          nasm gcc mtools xorriso grub-pc-bin grub-efi-ia32-bin grub-efi-amd64-bin \
          grub-common libisoburn-dev dos2unix grep sed awk curl jq

    - name: Otonom AI Derleme ve Canlı Sistem Onarım Motorunu Çalıştır
      run: |
        chmod +x build.sh
        ./build.sh

    - name: ISO'yu Actions Artifact Alanına Yükle
      uses: actions/upload-artifact@v4
      with:
        name: windos-release
        path: windos.iso
        if-no-files-found: error
