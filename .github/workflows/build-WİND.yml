name: Sky Core OS Build Pipeline

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build-os:
    runs-on: ubuntu-latest

    steps:
    - name: Repoyu Klonla
      uses: actions/checkout@v4

    - name: Derleme Araçlarını Kur (GCC Cross-Compiler & NASM)
      run: |
        sudo apt-get update
        sudo apt-get install -y gcc-multilib g++-multilib nasm make lld binutils

    - name: Çalıştırılabilir İzinleri Ver
      run: chmod +x ./build.sh

    - name: Çekirdeği Derle (Saf Terminal Modu)
      run: ./build.sh

    - name: Derleme Çıktılarını Arşivle (Artifact)
      if: success()
      uses: actions/upload-artifact@v4
      with:
        name: skycore-vortex-kernel
        path: |
          bin/
          *.bin
          *.iso
        if-no-files-found: warn
