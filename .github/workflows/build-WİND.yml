name: 🚀 WIND OS ULTRA BUILD & BOOT ENGINE

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build_and_test:
    runs-on: ubuntu-latest

    steps:
    - name: 📥 Depoyu Klonla
      uses: actions/checkout@v4

    - name: 🛠️ Saf Derleme ve Emülatör Paketlerini Kur
      run: |
        sudo apt-get update
        # Sadece ham gcc, nasm ve xorriso çekiyoruz. Çöken tüm yan araçlar elendi.
        sudo apt-get install -y nasm xorriso gcc-multilib build-essential bc
        # Sanal ekran ve ekran analizi için kararlı paketler
        sudo apt-get install -y qemu-system-x86 xvfb imagemagick

    - name: 🔑 Çalıştırma İzinlerini Ayarla
      run: chmod +x build.sh

    - name: 🏗️ Sistemi Sıfırdan Derle (Run Build Script)
      run: ./build.sh

    - name: 🖥️ Canlı QEMU Boot Testi ve Ekran Analizi
      run: |
        echo "[+] Arka plan sanal ekran kartı (Xvfb) ayağa kaldırılıyor..."
        Xvfb :99 -screen 0 1024x768x24 &
        export DISPLAY=:99
        sleep 2

        echo "[+] Sky Core OS, QEMU emülatöründe tetikleniyor..."
        # Çekirdeği korumalı grafik moduyla emüle ediyoruz
        qemu-system-x86_64 -cdrom os_image.iso -m 512M -vga std -display x11 &
        QEMU_PID=$!
        
        # Çekirdeğin hafızayı haritalayıp mor pikselleri basması için tam 8 saniye mühlet veriyoruz
        echo "[+] Çekirdeğin grafik modunu oturtması bekleniyor (8 Saniye)..."
        sleep 8

        echo "[+] Canlı ekran görüntüsü hafızadan çekiliyor..."
        import -window root screenshot.png
        
        echo "[+] QEMU işlemcisi kapatılıyor..."
        kill -9 $QEMU_PID || true

        echo "[🔍] Piksel Parlaklık ve Renk Yoğunluğu Analiz Ediliyor..."
        # Ekranın gri tonlama ortalamasını alarak siyah kalıp kalmadığını test ediyoruz
        MEAN_COLOR=$(convert screenshot.png -colorspace Gray -format "%[fx:mean]" info:)
        echo "[+] Algılanan Ekran Değeri: $MEAN_COLOR"

        # Eğer ekran tamamen siyah değilse (0.01'den büyükse) mor UI veya bootloader ekranı gelmiştir
        if (( $(echo "$MEAN_COLOR < 0.01" | bc -l) )); then
          echo "======================================================================"
          echo "❌ HATA: Ekran tamamen siyah kaldı! Grafik katmanı kilitlendi."
          echo "======================================================================"
          exit 1
        else
          echo "======================================================================"
          echo "✅ BAŞARILI: Piksel uyanışı gerçekleşti, ekran simsiyah değil!"
          echo "======================================================================"
        fi

    - name: 📦 Çıktıları Güvenli Şekilde Artifact Olarak Kaydet
      if: always() # Hata çıksa bile ekran görüntüsünü indirebilmen için kilit adım
      uses: actions/upload-artifact@v4
      with:
        name: SkyCoreOS-Sanal-Makine-Sonucu
        path: |
          os_image.iso
          screenshot.png
