name: Sky-Core-OS Release
on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Build System
        run: |
          make clean
          make all # Burası senin derleme komutun

      - name: Create Release
        uses: softprops/action-gh-release@v1
        if: startsWith(github.ref, 'refs/tags/') # Sadece tag atıldığında çalışır
        with:
          files: |
            build/my_os.bin # Buraya derleme sonucu oluşan dosyanın yolunu yaz
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
